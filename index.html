<script>
// Countdown Timer

setInterval(function(){
  var min = Math.floor(time/60);

  document.getElementById("timer").innerHTML = "Offer Ends In " + min + ":" + (sec < 10 ? "0"+sec : sec);

  var utr = document.getElementById("utr").value;

  var msg = "Hello, maine ₹99 webinar ke liye payment kar diya hai.\n\nName: " + name +
            "\nMobile: " + phone +
            "\nUTR: " + utr;

  var url = "https://wa.me/919569476799R
  ?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
}

// UPI Payment
function payNow(){
  var upi = "7607822052@fam"
  var name = document.getElementById("name").value;

  var url = "upi://pay?pa=" + upi + "&pn=Webinar&am=99&cu=INR&tn=Webinar Fee - " + name;
